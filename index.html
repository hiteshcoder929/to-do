<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" id="lightcss">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>to-do list</title>
</head>

<body>
    <!-- mainbody -->
    <div class="container">
        <!-- header -->
        <div class="head">
            <div class="title">
                <h1>To-Do List</h1>
                <p class="counter">counter:
                    <span></span>
                </p>
            </div>
            <div class="search-bar">
                <input class="search-box" type="text" placeholder="search">
                <i style="cursor:pointer"
                 class="fa-solid fa-magnifying-glass search-btn"></i>
            </div>
        </div>

        <!-- main body -->
        <div class="section">
            <div class="a1">
                <form class="task-input">
                    <input class="user-input" type="text" id="input" placeholder="write your task">
                    <button type="submit" class="add-button"><i class="fa-solid fa-plus"></i></button>
                </form>
                <div class="clear">X</div>
                <div class="clear-com">X</div>
            </div>
            <div class="task-list">
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"> </script>
</body>

</html>
